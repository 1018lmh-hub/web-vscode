<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>목록을 만들자</title>
</head>
<body>
    <!--
        <li> : 기본적인 목록을 만드는 태그
    -->

    우리 공부한 목록 :
    <li>Java</li>
    <li>SQL</li>
    <li>JDBC</li>
    <li>MyBatis</li>

    <h3>ul : 순서가 없는 목록을 사용할 때 쓰는 태그</h3>

    <ul>
        <li>HTML</li>
            <ul>
                <li>글자관련태그</li>
                <li>목록태그</li>
            </ul>
        <li>CSS</li>
        <li>JavaScript</li>
        <li>React</li>
    </ul>

    <!--bullet 기호 : 채워진 원, 반원, 네모네모, 내가쓰고싶은 거-->

    <h3>ol : 순서가 있는 목록을 사용할 때 쓰는 태그</h3>

    <ol start="10" type="1">
        <li>목록</li>
        <li>목록</li>
        <li>목록</li>
    </ol>

    <h3>dl : 설명을 적을 때 쓰는 태그    </h3>
    <dl>    
        <dt>설명제목</dt>
        <dd>설명내용 1</dd>
        <dd>설명내용 2</dd>
        <dd>설명내용 3</dd>


    </dl>
    <br><br><br><br><br><br><br><br><br><br><br><br><br><br><br>
</body>
</html>
