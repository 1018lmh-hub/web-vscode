<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이미지를 넣어볼게요</title>
</head>
<style>
    #election:hover{
        cursor : pointer;
        transition: transfrom 400ms;
        transform: scale(1.1);
    }
</style>
<body>
    <h2>이미지 관련 테그</h2>
    <img id="election" width="600"
    src="https://ssl.pstatic.net/melona/libs/1564/1564763/d74ef3af860c469e1028_20260420164044559.jpg" >

<!--
    <img src="이미지의 경로(필수)"    
         alt="이미지에 대한 설명"   
         width="가로길이"
         height="세로길이"
-->
<img src="img/frog.jpg"
     width="150"
     height="200"
     alt="개구리">
<!--이거 왜 다 날아감; 2시-->

<p>
    

</p>

    <hr />

    <h4>* width와 height 속성</h4>


    <p>
        요소의 가로, 세로길이 조절하는 속성 <br>
        고정길이(px), 가변길이(%)로 지정이 가능하다.
        pixel에 대해서 고정길이지만 기기에 따라서 다르다. 왜요?

    </p>

    <h4>기본단위 == px</h4>
    <!-- VSCode 자주쓰는 단축키
        행 복사 : Alt + shift + 위 아래 방향키
        행 이동 : Alt + 위 아래 방향키
        행 삭제 : Ctrl + X(사실 삭제는 아니고 행 잘라내기)
    -->
        <img src="image/apple.jpg" alt="과일" height="150" width="150">
        <img src="image/cat.jpg" alt="동물" height="150" width="190">
        <img src="image/cat2.jpg" alt="동물" height="150" width="160">

       
    <!--부모요소의 크기가 바뀌더라도 크기변동이 일어나지 않음-->
    <hr/>

    <h4>가변길이 단위 == %</h4>
         <img src="image/apple.jpg" alt="과일" height="150" width="33%">
        <img src="image/cat.jpg" alt="동물" height="150" width="33%">
        <img src="image/cat2.jpg" alt="동물" height="22%" width="33%">
    
    <h3>미디어 관련 태그</h3>    
    <audio src=""></audio>
    <video src=""></video>
    <!--
        src : 미디파일 및 오디오 파일의 경로
        controls : 플레이어를 보일까 말까
        autoplay : 자동재생을 할까 말까
        loop : 반복을 할까 말까
        post : 썸네일 이미지를 지정
    -->
    <br><br><br><br><br><br><br><br><br><br>
</body>
</html>
