    <script>
        
      


        let page = 1;
        function next(){
            page++;

            requestCafe(page);
            $('#page').html(`[${page}]`);

        };

            if(!pageNo) pageNo =1;

                    //                 <th>${sigunName}</th>
                    //                 <th>${address}</th>
                    //             </tr>`;

                    const el = cafes.map(e => `<tr>
                                            <th>${e.BIZPLC_NM}</th>
                                            <th>${e.SIGUN_NM}</th>
                                            <th>${e.REFINE_ROADNM_ADDR}</th>
                                            </tr>`).join('');
                    document.querySelector('tbody').innerHTML = el;
                }
            });



        // fetch('https://openapi.gg.go.kr/Genrestrtcate?Type=json')

    <script>
        $(function(){
            $('#hide').click(function(){

            $('#toggle').click(function(){

<!-- 
    회사에서 API 제공 시 장점 
    데이터 사용량 수집해서 많이 사용하는 데이터를 더 잘 만들어줌
    사용자가 늘어나고 개발자가 더 규모가 크게 만들수록 API 의존성이 높아져서
    다른 걸로 바꾸기 힘들어짐 구글맵도 유료전환해서 사람들이 울며 겨자먹기로 결제
 -->

 <hr>


 <button onclick="letsGo();">곤드레만드레밥보기</button>

<div style="padding: 100px; " id="busan">

</div>

 <script>
    let pageNo = 1;
    function letsGo(){
        $.ajax({
            url : 'https://apis.data.go.kr/6260000/FoodService/getFoodKr?serviceKey=9d1c5db0d24312de355ff85d457e580b7c2196346ded3461a3150030a423c2ca&numOfRows=10&resultType=JSON&pageNo=' + pageNo++,
            dataType : 'json',
            success : e =>{
                // console.log(e.getFoodKr.item);
                const items = e.getFoodKr.item;
                console.log(items);

                const el = items.map(e=>`
                                          <div style="display:flex; width:100%; height:160px;
                                                    margin-bottom:10px">
                                            <div style="flex:2; padding: 7px;">
                                                <img src="${e.MAIN_IMG_NORMAL}"
                                                     width="100%"
                                                     height="100%"/>
                                            </div>
                                            <div style="flex:8; padding: 7px;">
                                                <h4>가게명 : ${e.MAIN_TITLE}</h4>
                                                <p>대표메뉴 : ${e.RPRSNTV_MENU}</p>
                                                <div>
                                                    ${e.ITEMCNTNTS}
                                                </div>
                                            </div>          
                                          </div>
                                        `).join('');
                document.querySelector('#busan').innerHTML = el;
            }
        });
    }

 </script>

 <!-- 
        jQuery : 자바스크립트 라이브러리

        요소 선택하는 방법 : $('CSS선택자')
        Content영역 변경하는 법 : html()
        Style 변경하는 법 : css()
        EventHandler 다는 법 (Click) : click()
        Input 요소 value 속성 접근하는 법 : val()
 -->
