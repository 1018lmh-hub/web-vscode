<!DOCTYPE html>
<html lang="en">
<head>
    <title>연습연습박</title>

      <style>
        div, header, main, footer{
            border: 1px solid red;
            box-sizing: border-box;
        }
        /* 그러면 선 굵어지게 하기 싫으면 padding기준으로 해야하나?
        padding인 거 */

        #wrap{
            width: 1000px;
            height: 800px;
            margin: auto;
            display: flex;
            flex-direction: column;
        }

        header, footer{
            flex: 2;
        }

        main{
            flex: 6;
            display: flex;
        }

        #content-1{
            flex: 7;
        }

        #content-2{
            flex:3;
        }

      
    </style>
</head>
<body>

    <div id="wrap">
        <header></header>
        <main>
            <div id="content-1"></div>
            <div id="content-2"></div>
        </main>
        <footer></footer>
    </div>
    
</body>
</html>
