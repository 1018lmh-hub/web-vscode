<!DOCTYPE html>
<html lang="en">
<head>
    <title>1번입니다.</title>

    <style>
        .size-test{
            border: 10px solid brown;
            height: 200px;
            background-color: aqua;
        }
        #test1{
            width: 40%;
        }
        #test2{
            width: 400px;
        }

        .nemo{
            width: 150px;
            height: 150px;
            border: 1px solid black;
        }

        .red{
            background-color: red;
        }

        .aqua{
            background-color: aqua;
        }

        .azure{
            background-color: azure;
        }

        .blue{
            background-color: blue;
        }

        .blueviolet{
            background-color: blueviolet;
        }

        .inline{
            display: inline;
        }

        .ib{
            display: inline-block;
        }
    </style>
</head>
<body>

    <!-- 
        블럭요소    : 한 줄 단위로 영역이 잡힘
        인라인요소  : content크기만큼만 영역이 잡힘

    -->

    <h3>width, height</h3>

    <p>content영역의 크기를 조절하는 속성</p>

    <div id="size">
        <div id="test1" class="size-test"></div>
        <div id="test2" class="size-test"></div>
    </div>

    <!-- #size>#test$.size-test*2     -->


    <hr>
    <h2>display : 화면 배치 방법 변경</h2>

    <pre>
        선택자{
            display : inline / block☆ / inline-block☆ / hidden☆ / flex☆
            /table-cell / ... 별표 자주씀
        }
    </pre>

    <p>기본!</p>

    <div class="nemo red">1</div>
    <div class="nemo aqua">2</div>
    <div class="nemo azure">3</div>
    <div class="nemo blue">4</div>
    <div class="nemo blueviolet">5</div>

    <hr>

    <p>inline</p>
    <div class="nemo inline red">1</div>
    <div class="nemo inline aqua">2</div>
    <div class="nemo inline azure">3</div>
    <div class="nemo inline blue">4</div>
    <div class="nemo inline blueviolet">5</div>
    <strong>display : inline==width,height속성 적용 X</strong>
    
    <hr>

    <p>ib</p>
    <div class="nemo ib red">1</div
    ><div class="nemo ib aqua">2</div><!--
    --><div class="nemo ib azure">3</div>
    <div class="nemo ib blue">4</div>
    <div class="nemo ib blueviolet">5</div>
    
    <hr>

    <div class="nemo red">1</div>
    <div class="nemo aqua">2</div>
    <div class="nemo azure">3</div>
    <div class="nemo blue">4</div>
    <div class="nemo blueviolet">5</div>
    
    
    <hr>
    <br><br><br><br><br><br><br><br><br><br><br><br><br><br><br>
</body>
</html>
