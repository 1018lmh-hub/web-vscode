<!DOCTYPE html>
<html lang="en">
<head>
    <title>검 색 이 다</title>

    <style>
        div, form{
            border: 1px solid red;
            box-sizing: border-box;

        }

        #header_2{
            width: 650px;
            height: 160px;
        }
        /* ---------------------------요 밑에만 싸악 들고 갈 예정 */

        #header_2{
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* form태그 */
        #search-form{
            width: 85%;
            height: 44px;
            display: flex;
            padding: 4px;
            background-color: #fafafa;
            border-radius: 17px;
        }

        #search-text{
            flex: 7.5;
        }

        #search-btn{
            flex: 1.5;
        }

        #search-text>input{
            width: 100%;
            height: 100%;
            box-sizing: border-box;
            border: none;
            padding: 0 15px;
            columns: #1a1a1a;
            border-radius: 8px;

            & :focus{
                outline: #eeeeee;
            }
          
        }
        #search-btn>button{
            width: 100%;
            height: 100%;
            border-radius: 18px;
            background-color: #1a1a1a;
            color: #fafafa;
            font-weight: 600;
            
            &:hover{
                background-color: #fafafa;
                color: #1a1a1a;
                cursor: pointer;
            }
        }
    </style>
</head>
<body>
    <div id="header_2">
        <form action="search" method="get" id="search-form">
            <div id="search-text">
                <input type="text" name="query" placeholder="검색어를 입력" />
            </div>
            <div id="search-btn">
                <button type="submit">검색하기</button>
            </div>
            
        </form>
    </div>
    
</body>
</html>
