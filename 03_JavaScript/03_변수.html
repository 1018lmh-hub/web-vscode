<!DOCTYPE html>
<html lang="en">
<head>
    <title>변수</title>
</head>
<body>
    
<h1>자바스크립트의 경우 자료형을 선언하지 않음</h1>


<h3>자바 스크립트는 총 세개의 키워드로 변수를 선언할 ㅅ ㅜ있음</h3>
<h4>*var,let,const</h4>

<button onclick="variable();">변수선언해보기</button>

<script>
    function variable(){
        var userId = 'user01';
        console.log(userId);

        userId = 'user02';
        console.log(userId);

        userId=123;
        console.log(userId);

        userId= false;
        console.log(userId);

        var userId = 'user03';
        console.log(userId);
        // 변수 선언했는데 같은 블럭 안에서 또 가능
        // 이상한 녀석임 그래서 잘 쓰지 않는 것을 추천


        let userPwd = 'pass01';
        console.log(userPwd);

        userPwd= 'pass02';
        console.log(userPwd);
        // 얘는 변수 선언 한번만 가능

        const userName = '고길동'
        console.log(userName);

        //userName ='123123'
        // const email;
        // 재할당 X, 할당 안하고 쓰기 X


        //var / let / const
        // var ==중복선언 가능 , 저혈당 가능
        //let == 중복선언 불가능, 재할당 가능
        // const == 중복선언 불가능, 재할당 불가능 , 초기화 반드시 해야함!


        const response =  '요청 보내는 거~';
        // 정수값, 조회결과 하나,  조회결과 여러개

        // 권장사항 : 반드시 const를 이용해서 변수를 선언
        //              혹시나 변경이 필요할 때는 let을 사용


    };


</script>

<hr>
<button onclick="scope();">버거킹</button>
<script>
    function scope(){

        for(var i = 0; i < 5; i++){}
        console.log(i);
        if(1){
            var userName='홍길동';
        }
        console.log(userName);
        //1)var는 functionScope 안에서 살아있음
        // 변수가 선언된 영역에서 계속 사용할 수 있음

        if(2){
            let age = 20;
            const hobby = '취미당~';
        }

        //2) let, const는 blockScope
        //선언된 블럭에서만 사용가능
        console.log(age);
        console.log(hobby);
    }
</script>

    <br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br>
</body>
</html>
