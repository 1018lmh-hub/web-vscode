    <div id="area4" class="area small"></div>
    <button onclick="sort();">정렬</button>

    <script>
        function sort(){
            const arr = ['Banana', 'Lemon', 'Apple', '수박', '망고', '葡萄' ];

            const area = document.querySelector('#area4');
            area.innerHTML = `${arr} <br>`;
            arr.sort();
            area.innerHTML += `${arr} <br>`;
            arr.reverse();
            area.innerHTML += `${arr} <br>`;

            //slice(begin, end) : 배열의 요소를 추출해줌
            area.innerHTML += `${arr.slice(4,6)} <br>`;
            area.innerHTML += `${arr.splice(1,1,'빠나나~')} <br>`;
            area.innerHTML += `${arr} <br>`;
            area.innerHTML += `${arr.splice(3, 2)} <br>`;
            area.innerHTML += `${arr} <br>`;


        }
    </script>

    <h4>join() :배열에 담긴 요소를 하나의 string 타입으로 합쳐주는 메소드</h4>

    <div id="area5" class="area small"></div>
    <button onclick="join();">버튼이요</button>

    <script>
        function join(){
            const area = document.querySelector('#area5');

            const arr = ['홍길동', '고길동', '짱구', '도라에몽', '보노보노'];

            area.innerHTML = arr;
            //출력 형식
            // 이름 : 홍길동
            // 이름 : 고길동
            // 이렇게 하고 싶음

            const names = arr.map(function(name){
                return '이름 : ' + name + '<br>';
            });
            console.log(names);

            area.innerHTML = names.join("");

            const names2 = arr.map(n => `이름 : ${n}<br>`).join('');
            area.innerHTML = names2;

            const obj = {
                과일 : "사과"
            };

            area.innerHTML += obj.toString;
            //println(참조자료형.toString())
            area.innerHTML += arr.toString();
        }
    </script>
